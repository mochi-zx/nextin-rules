proxy-groups:
  # 所有普通国外代理规则都指向这个组。
  # 默认第一项是 日美节点，所以正常情况下只会走美国 / 日本。
  # 需要临时切韩国、港澳、10x+ 时，在 Nextin 中手动切换这个组即可。
  - name: 国外流量
    type: select
    proxies:
      - 日美节点
      - 美国节点
      - 日本节点
      - 韩国节点
      - 港澳节点
      - 10x+节点
      - DIRECT

  # OpenAI / Anthropic 强制使用美国节点，不经过 国外流量。
  - name: 美国节点
    type: url-test
    include-all: true
    filter: "(?i)(美国|美國|United States|\\bUS\\b|\\bUSA\\b)"
    exclude-filter: "(?i)(5\\.[1-9][0-9]*\\s*x|[6-9](\\.\\d+)?\\s*x|[1-9][0-9]+(\\.\\d+)?\\s*x)"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 80
    lazy: true

  - name: 日本节点
    type: url-test
    include-all: true
    filter: "(?i)(日本|Japan|\\bJP\\b|JPN)"
    exclude-filter: "(?i)(5\\.[1-9][0-9]*\\s*x|[6-9](\\.\\d+)?\\s*x|[1-9][0-9]+(\\.\\d+)?\\s*x)"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 80
    lazy: true

  - name: 日美节点
    type: url-test
    proxies:
      - 美国节点
      - 日本节点
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 80
    lazy: true

  # 下面三个组只作为备用，不会被默认日美节点自动使用。
  - name: 韩国节点
    type: url-test
    include-all: true
    filter: "(?i)(韩国|韓國|南韩|南韓|Korea|\\bKR\\b|KOR)"
    exclude-filter: "(?i)(5\\.[1-9][0-9]*\\s*x|[6-9](\\.\\d+)?\\s*x|[1-9][0-9]+(\\.\\d+)?\\s*x)"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 80
    lazy: true

  - name: 港澳节点
    type: url-test
    include-all: true
    filter: "(?i)(香港|Hong Kong|\\bHK\\b|HKG|澳门|澳門|Macao|Macau|\\bMO\\b)"
    exclude-filter: "(?i)(5\\.[1-9][0-9]*\\s*x|[6-9](\\.\\d+)?\\s*x|[1-9][0-9]+(\\.\\d+)?\\s*x)"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 80
    lazy: true

  - name: 10x+节点
    type: url-test
    include-all: true
    filter: "(?i)(1[0-9](\\.\\d+)?\\s*x|[2-9][0-9](\\.\\d+)?\\s*x|[1-9][0-9]{2,}(\\.\\d+)?\\s*x|10x|20x|30x|50x|100x)"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 80
    lazy: true

rules:
  # 微信直连：iOS 不使用 PROCESS-NAME，只保留规则集
  - RULE-SET,WeChat,DIRECT

  # OpenAI / ChatGPT / Codex / iOS ChatGPT App -> 美国节点
