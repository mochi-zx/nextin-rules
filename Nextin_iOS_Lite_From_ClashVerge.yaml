# Nextin iOS 轻量版订阅模板覆写
# 基于 Mac ClashVerge 配置改造：
# - OpenAI / ChatGPT / Codex / Anthropic / Claude -> 美国节点
# - 其他国外代理流量 -> 国外流量，默认选中 日美节点
# - 国内 / 公司内网 / 微信 -> DIRECT
# - 韩国 / 港澳 / 10x+ 仅作为手动备用，不参与默认日美自动
# - 已删除 PROCESS-NAME 规则，iOS 上主要靠域名和规则集分流

