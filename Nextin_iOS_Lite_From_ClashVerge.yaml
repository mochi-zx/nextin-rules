  - RULE-SET,Gemini,国外流量
  - RULE-SET,Copilot,国外流量
  - RULE-SET,GitHub,国外流量
  - RULE-SET,Twitter,国外流量
  - RULE-SET,Notion,国外流量
  - RULE-SET,proxy,国外流量
