DOMAIN,ios.chat.openai.com,美国节点
DOMAIN,chat.openai.com,美国节点
DOMAIN,ws.chatgpt.com,美国节点
DOMAIN,auth0.openai.com,美国节点
DOMAIN,setup.auth.openai.com,美国节点
DOMAIN,challenges.cloudflare.com,美国节点
